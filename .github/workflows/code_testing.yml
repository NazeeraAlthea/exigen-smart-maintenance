# File: .github/workflows/code_testing.yml
name: CI - Code Testing

# Trigger: Jalan setiap kali ada push atau pull request ke branch main
on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development", "main" ]

jobs:
  test-code:
    runs-on: ubuntu-latest # Robotnya pakai OS Linux
    
    steps:
    - name: Mengambil kode dari repository
      uses: actions/checkout@v4
      
    - name: Menyiapkan Python 3.11.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.11.9"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    # Kalau nanti kamu punya script test, bisa ditambah di sini
    # - name: Jalankan Unit Test
    #   run: pytest
